name: Deploy to Render

permissions:
  contents: read
  deployments: write

on:
  push:
    tags:
      - v**
  workflow_dispatch:

concurrency:
  group: render
  cancel-in-progress: true

jobs:
  deployment:
    runs-on: ubuntu-latest
    environment: render
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate production build
        run: npm run build

      - name: Trigger deploy to Render
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl "$deploy_url"
