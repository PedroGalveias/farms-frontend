name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs for the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lint, type-check, test, and build. Runs on every push and pull request,
  # and gates the deploy job below.
  verify:
    name: Lint, test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  # Trigger a Render deploy only after `verify` passes, and only for pushes
  # (or manual runs) on the default branch. Pull requests never deploy.
  deploy:
    name: Deploy to Render
    needs: verify
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: render
    permissions:
      contents: read
      deployments: write
    concurrency:
      group: render
      cancel-in-progress: true
    steps:
      - name: Trigger deploy hook
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$deploy_url" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set." >&2
            exit 1
          fi
          curl -fsS "$deploy_url"
