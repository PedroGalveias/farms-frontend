name: CI

on:
  push:
    branches: [main]
    # Version tags (e.g. v1.2.3) are what trigger a Render deploy — see the
    # deploy job below. Pushes to main run CI but no longer deploy.
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs for the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lint, type-check, test, and build. Runs on every push and pull request,
  # and gates the deploy job below.
  verify:
    name: Lint, test & build
    runs-on: ubuntu-latest
    # pull-requests: write lets the coverage report be posted as a PR comment.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Report coverage on PR
        # Runs even if the coverage thresholds failed, so the numbers are still
        # surfaced on the pull request. Skipped for non-PR (push) events.
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: davelosert/vitest-coverage-report-action@v2

      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

      - name: Build
        run: npm run build

  # End-to-end smoke tests against a production build in a real browser.
  # Real-Windows coverage: unit tests + production build on windows-latest,
  # plus the Firefox e2e specs that guard Windows-specific regressions (the
  # fixed-glass anchoring bug only reproduced on Windows Firefox). Kept to the
  # targeted specs so the runner stays fast; the full matrix runs on Linux.
  windows:
    name: Windows (unit, build, Firefox + Chromium + WebKit e2e)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npx vitest run

      - name: Production build
        run: npm run build

      - name: Resolve Playwright version
        id: playwright
        shell: bash
        run: |
          echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ms-playwright
          key: ${{ runner.os }}-playwright-all-${{ steps.playwright.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install firefox chromium webkit

      # The full engine grid on Windows: Firefox has a history of real
      # Windows-only bugs here (frozen animations, fixed-glass positioning),
      # Chromium stands in for Chrome/Edge, and WebKit keeps the third
      # engine honest on this OS too.
      - name: Firefox + Chromium + WebKit e2e (cross-OS specs)
        run: npx playwright test smoke navigation fixed-chrome quick-search --project=firefox --project=chromium --project=webkit

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-windows
          path: playwright-report/
          if-no-files-found: ignore

  # macOS is where Safari actually lives — WebKit on macOS exercises the
  # native font stack, scrollbars, and compositor the Linux webkit build
  # only approximates; Firefox and Chromium complete the engine grid on
  # this OS. Shared cross-OS spec list; the full suite runs on Linux.
  macos:
    name: macOS (unit, WebKit + Firefox + Chromium e2e)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npx vitest run

      - name: Resolve Playwright version
        id: playwright
        run: |
          echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ms-playwright
          key: ${{ runner.os }}-playwright-all-${{ steps.playwright.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install webkit firefox chromium

      - name: WebKit + Firefox + Chromium e2e (cross-OS specs)
        run: npx playwright test smoke navigation fixed-chrome quick-search --project=webkit --project=firefox --project=chromium

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-macos
          path: playwright-report/
          if-no-files-found: ignore

  e2e:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: playwright
        run: |
          echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      # Cache the browser downloads, keyed on the Playwright version + the engine
      # set (so adding Firefox/WebKit invalidates the old Chromium-only cache).
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-cfw-${{ steps.playwright.outputs.version }}

      # On a cache hit the browsers are already present — only the OS-level
      # dependencies (not cached) need installing, which is fast.
      - name: Install Playwright (browsers + OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Install Playwright OS deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  # Keep the internal version in lockstep with release tags: a `vX.Y.Z` tag
  # must match package.json's "version" exactly, or the deploy is blocked.
  # (Bump package.json before cutting the tag.) The footer's displayed version
  # already derives from `git describe`; this pins the package manifest too.
  tag-version:
    name: Tag matches package.json version
    # Runs for tag pushes (enforces) and manual dispatches (no-op pass) — a
    # skipped `needs` entry would otherwise skip the deploy job it gates.
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify tag == v<package.json version>
        run: |
          case "$GITHUB_REF" in
            refs/tags/*) ;;
            *) echo "Not a tag push — nothing to verify."; exit 0 ;;
          esac
          TAG="${GITHUB_REF#refs/tags/}"
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $TAG does not match package.json ($PKG). Bump package.json before tagging."
            exit 1
          fi
          echo "OK: $TAG == $PKG"

  # Trigger a Render deploy only after checks pass, and only for a pushed
  # version tag (or an explicit manual run). Pushes to main and pull requests
  # never deploy — cut a `v*` tag to ship.
  deploy:
    name: Deploy to Render
    needs: [verify, e2e, windows, macos, tag-version]
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: render
    permissions:
      contents: read
      deployments: write
    concurrency:
      group: render
      cancel-in-progress: true
    steps:
      - name: Trigger deploy hook
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$deploy_url" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set." >&2
            exit 1
          fi
          curl -fsS "$deploy_url"
