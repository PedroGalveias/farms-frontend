# Build the app into a container image and publish it to GHCR — ONLY for a
# pushed version tag (v*), mirroring the backend's build-and-push job. Pushes
# to main never build an image; a tag produces a package tagged `latest` + the
# release version (e.g. ghcr.io/pedrogalveias/farms-frontend:v0.12.1).
name: Publish container image to GHCR

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # latest on every publish + the release tag itself on a tag push.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The footer version derives from git describe at build time, but the
          # Docker context excludes .git — pass the tag through explicitly.
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ github.ref_type == 'tag' && github.ref_name || '' }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline
